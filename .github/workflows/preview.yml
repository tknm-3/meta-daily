name: DLM Preview

# Inspect what the bot would post (the meta digest), against live data, without
# touching Discord. Runs on src changes on this branch and publishes the
# rendered digest as a downloadable artifact + a job-summary preview.
#
# It deliberately does NOT commit data/preview.json back to the repo: that file
# is generated and changes on every run (timestamps + live data), so committing
# it made the branch and main diverge constantly and caused merge conflicts.
# The file is gitignored; a static sample lives in data/preview.sample.json.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/duellinks-tournament-bot-LV24s
      - claude/tournament-decks-meta-cards-DhBfA
    paths:
      - 'src/**'
      - '.github/workflows/preview.yml'

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build live preview
        run: PYTHONPATH=src python -m dlm.bot preview

      - name: Render preview into the job summary
        run: |
          {
            echo '## DLM meta digest — live preview'
            echo '```json'
            cat data/preview.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-json
          path: data/preview.json
          if-no-files-found: error

name: Matchup Feasibility Probe

# Diagnostic-only: from a GitHub-hosted runner (which has outbound internet,
# unlike the dev sandbox) check whether match-level / bracket data is obtainable
# for a deck matchup table. Commits the captured shape back to the branch.

on:
  workflow_dispatch:
  push:
    branches:
      - claude/meta-matchup-table-4V7l5
    paths:
      - 'scripts/probe_matchups.py'
      - '.github/workflows/probe-matchups.yml'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run matchup feasibility probe
        run: python scripts/probe_matchups.py

      - name: Commit probe result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/probe-matchups.json
          if git diff --cached --quiet; then
            echo "No change in probe result."
          else
            git commit -m "chore: capture matchup feasibility probe result [skip ci]"
            git push
          fi
